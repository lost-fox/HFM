<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="css/fonts.css">
   <link rel="stylesheet" href="css/style.css">
   <link rel="shortcut icon" href="assets/icon/favicon.png" type="image/x-icon">
   <title>HFM</title>
</head>
<body>
   <header>
      <div class="wrapper">
         <div class="header-info flex">
            <p class="header-info__text">Member of HF Markets Group</p>
            <div class="header-info__actions flex">
               <button class="header-info__actions-btn flex">
                  <img class="header-info__actions-btn-img" src="assets/icon/mobile.png" alt="mobile icon">
                  <p class="header-info__actions-btn-text">Download App</p>
               </button>

               <div class="header-info__actions-links flex">
                  <a class="header-info__actions-links-link" href="#">Contact us</a>
                  <div class="line"></div>
                  <a class="header-info__actions-links-link" href="#">Partner with us</a>
                  <div class="line"></div>
                  <button class="header-info__actions-links-switch">
                     <img class="header-info__actions-links-switch-img" src="assets/icon/en-flag.png" alt="language en-flag">
                  </button>
               </div>
            </div>
         </div>

         <div class="header-main flex">
            <div class="header-main-nav flex">
               <img src="assets/icon/logo.png" alt="logo" class="header-main-nav__logo">
               <nav class="header-main-nav__nav flex">
                  <li class="header-main-nav__nav-item">
                     <a class="header-main-nav__nav-item-link" href="#">
                        Markets
                     </a>
                  </li>

                  <li class="header-main-nav__nav-item">
                     <a class="header-main-nav__nav-item-link" href="#">
                        Trading
                     </a>
                  </li>

                  <li class="header-main-nav__nav-item">
                     <a class="header-main-nav__nav-item-link" href="#">
                        Investing
                     </a>
                  </li>

                  <li class="header-main-nav__nav-item">
                     <a class="header-main-nav__nav-item-link" href="#">
                        Tools & Education
                     </a>
                  </li>

                  <li class="header-main-nav__nav-item">
                     <a class="header-main-nav__nav-item-link" href="#">
                        Company
                     </a>
                  </li>
               </nav>
            </div>

            <div class="header-main-bnt flex">
               <button class="header-main-bnt__login">Login</button>
               <button class="header-main-bnt__register">Register</button>
            </div>
         </div>
      </div>
   </header>

   <section class="lorem">
      <h1 class="lorem__title"><span class="lorem__title--gold">Lorem ipsum dolor</span><br> sit amet tosik </h1>

      <form class="form-wrapper">
         <div class="form">
            <h3 class="form__title">Lorem ipsum dolor sit amet</h3>
            <div class="form__fields flex">
               <input class="form-field" type="text" name="first name" id="first name" placeholder="First Name">
               <input class="form-field" type="text" name="last name" id="last name" placeholder="Last Name">
               <select class="form-field form__fields-select" name="country" id="country">
                  <option class="form__fields-select-option" value="" disabled selected>Country</option>
                  <option class="form__fields-select-option" value="us">US</option>
                  <option class="form__fields-select-option" value="uk">UK</option>
                  <option class="form__fields-select-option" value="india">India</option>
               </select>
               <div class="form__fields-phone flex">
                   <select class="form-field form__fields-phone-select" name="code" id="code">
                     <option class="form__fields-select-option" value="" disabled selected>Code</option>
                     <option class="form__fields-select-option" value="+1">+1</option>
                     <option class="form__fields-select-option" value="+44">+44</option>
                     <option class="form__fields-select-option" value="+91">+91</option>
                   </select>
                  <input class="form-field form__fields-phone-input" type="text" name="phone" id="phone" placeholder="Phone">
               </div>
               <input class="form-field" type="email" name="email" id="email" placeholder="Email">
               <select class="form-field form__fields-select" name="experience" id="experience">
                     <option class="form__fields-select-option" value="" disabled selected>Experience</option>
                     <option class="form__fields-select-option" value="yes">Yes</option>
                     <option class="form__fields-select-option" value="no">No</option>
               </select>
            </div>
         </div>
         <div class="form__policy flex">
            <input class="form__policy-input" type="checkbox" name="policy" id="policy">
            <p class="form__policy-text">I have read and accepted the <a class="form__policy-text--red" href="#">Privacy Policy</a>and <a class="form__policy-text--red" href="#">Terms and Conditions</a></p>
         </div>
         <button type="submit" class="form__btn">JOIN NOW</button>
      </form>
   </section>
</body>
</html>
