<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="css/fonts.css">
   <link rel="stylesheet" href="css/style.css">
   <link rel="shortcut icon" href="assets/icon/favicon.png" type="image/x-icon">
   <title>HFM</title>
</head>
<body>
   <header>
      <div class="wrapper">
         <div class="header-info flex">
            <p class="header-info__text">Member of HF Markets Group</p>
            <div class="header-info__actions flex">
               <button class="header-info__actions-btn flex">
                  <img class="header-info__actions-btn-img" src="assets/icon/mobile.png" alt="mobile icon">
                  <p class="header-info__actions-btn-text">Download App</p>
               </button>

               <div class="header-info__actions-links flex">
                  <a class="header-info__actions-links-link" href="#">Contact us</a>
                  <div class="line"></div>
                  <a class="header-info__actions-links-link" href="#">Partner with us</a>
                  <div class="line"></div>
                  <button class="header-info__actions-links-switch">
                     <img class="header-info__actions-links-switch-img" src="assets/icon/en-flag.png" alt="language en-flag">
                  </button>
               </div>
            </div>
         </div>

         <div class="header-main flex">
            <div class="header-main-nav flex">
               <img src="assets/icon/logo.png" alt="logo" class="header-main-nav__logo">
               <nav class="header-main-nav__nav flex">
                  <li class="header-main-nav__nav-item">
                     <a class="header-main-nav__nav-item-link" href="#">
                        Markets
                     </a>
                  </li>

                  <li class="header-main-nav__nav-item">
                     <a class="header-main-nav__nav-item-link" href="#">
                        Trading
                     </a>
                  </li>

                  <li class="header-main-nav__nav-item">
                     <a class="header-main-nav__nav-item-link" href="#">
                        Investing
                     </a>
                  </li>

                  <li class="header-main-nav__nav-item">
                     <a class="header-main-nav__nav-item-link" href="#">
                        Tools & Education
                     </a>
                  </li>

                  <li class="header-main-nav__nav-item">
                     <a class="header-main-nav__nav-item-link" href="#">
                        Company
                     </a>
                  </li>
               </nav>
            </div>

            <div class="header-main-bnt flex">
               <button class="header-main-bnt__login">Login</button>
               <button class="header-main-bnt__register">Register</button>
            </div>
         </div>
      </div>
   </header>
</body>
</html>
